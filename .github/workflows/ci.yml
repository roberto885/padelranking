name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: punto
          POSTGRES_PASSWORD: punto_test
          POSTGRES_DB: punto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U punto -d punto_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://punto:punto_test@localhost:5432/punto_test
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
